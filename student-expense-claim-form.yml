    - data:
        code: "import datetime\nimport json\n\n\ndef main(\n    requestor,\n    department,\n\
          \    email,\n    student_id,\n    upload_files=None,\n    settings_json=None,\n\
          \    currencies=None,\n    expense_groups=None,\n):\n    def clean_string_list(values):\n\
          \        cleaned = []\n        seen = set()\n\n        for value in values\
          \ or []:\n            if value is None:\n                continue\n    \
          \        text = str(value).strip()\n            if not text or text in seen:\n\
          \                continue\n            cleaned.append(text)\n          \
          \  seen.add(text)\n\n        return cleaned\n\n    def parse_json_maybe(value,\
          \ default):\n        if value is None:\n            return default\n   \
          \     if isinstance(value, (dict, list)):\n            return value\n  \
          \      if isinstance(value, str):\n            text = value.strip()\n  \
          \          if not text:\n                return default\n            try:\n\
          \                return json.loads(text)\n            except json.JSONDecodeError:\n\
          \                return default\n        return default\n\n    def normalize_upload_files(value):\n\
          \        raw_files = parse_json_maybe(value, value)\n\n        if raw_files\
          \ is None:\n            return []\n        if isinstance(raw_files, dict):\n\
          \            raw_files = [raw_files]\n        if not isinstance(raw_files,\
          \ list):\n            return [{\"name\": str(raw_files), \"type\": \"\"\
          , \"size\": None}]\n\n        files = []\n        for item in raw_files:\n\
          \            if isinstance(item, dict):\n                files.append(\n\
          \                    {\n                        \"name\": item.get(\"name\"\
          ) or item.get(\"filename\") or item.get(\"title\") or \"\",\n          \
          \              \"type\": item.get(\"mime_type\") or item.get(\"type\") or\
          \ item.get(\"extension\") or \"\",\n                        \"size\": item.get(\"\
          size\"),\n                        \"url\": item.get(\"url\") or item.get(\"\
          download_url\") or \"\",\n                    }\n                )\n   \
          \         else:\n                files.append({\"name\": str(item), \"type\"\
          : \"\", \"size\": None, \"url\": \"\"})\n        return files\n\n    def\
          \ load_settings_inline(settings_payload, currency_values, expense_group_values):\n\
          \        data = parse_json_maybe(settings_payload, {})\n        if not isinstance(data,\
          \ dict):\n            data = {}\n\n        currencies = [\n            value.upper()\n\
          \            for value in clean_string_list(\n                currency_values\
          \ if currency_values is not None else data.get(\"currencies\", [])\n   \
          \         )\n        ]\n        expense_groups = clean_string_list(\n  \
          \          expense_group_values if expense_group_values is not None else\
          \ data.get(\"expense_groups\", [])\n        )\n\n        return {\n    \
          \        \"currencies\": currencies,\n            \"expense_groups\": expense_groups,\n\
          \        }\n\n    settings = load_settings_inline(settings_json, currencies,\
          \ expense_groups)\n    fixed_identity = {\n        \"requestor\": requestor,\n\
          \        \"email\": email,\n        \"department\": department,\n      \
          \  \"student_id\": str(student_id) if student_id is not None else \"\",\n\
          \    }\n    file_summary = normalize_upload_files(upload_files)\n\n    context_obj\
          \ = {\n        \"timestamp\": datetime.datetime.now(\n            tz=datetime.timezone(datetime.timedelta(hours=8))\n\
          \        ).isoformat(),\n        \"identity\": fixed_identity,\n       \
          \ \"upload_summary\": {\n            \"file_count\": len(file_summary),\n\
          \            \"files\": file_summary,\n        },\n        \"allowed_form_options\"\
          : {\n            \"currencies\": settings[\"currencies\"],\n           \
          \ \"expense_groups\": settings[\"expense_groups\"],\n        },\n    }\n\
          \n    return {\n        \"fixed_identity\": json.dumps(fixed_identity, ensure_ascii=False),\n\
          \        \"fixed_identity_for_llm\": json.dumps(fixed_identity, ensure_ascii=False),\n\
          \        \"allowed_form_options\": json.dumps(\n            {\n        \
          \        \"currencies\": settings[\"currencies\"],\n                \"expense_groups\"\
          : settings[\"expense_groups\"],\n            },\n            ensure_ascii=False,\n\
          \        ),\n        \"enriched_context\": json.dumps(context_obj, ensure_ascii=False),\n\
          \        \"upload_file_summary\": json.dumps(file_summary, ensure_ascii=False),\n\
          \    }\n"
