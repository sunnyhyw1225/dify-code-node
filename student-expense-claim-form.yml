    - data:
        code: "import json\nimport re\n\n\ndef main(\n    llm_raw_output,\n    history_features=None,\n\
          \    receipt_extraction=None,\n    receipt_raw_text=None,\n    settings_json=None,\n\
          \    currencies=None,\n    expense_groups=None,\n):\n    def clean_string_list(values):\n\
          \        cleaned = []\n        seen = set()\n\n        for value in values\
          \ or []:\n            if value is None:\n                continue\n    \
          \        text = str(value).strip()\n            if not text or text in seen:\n\
          \                continue\n            cleaned.append(text)\n          \
          \  seen.add(text)\n\n        return cleaned\n\n    def parse_json_maybe(value,\
          \ default):\n        if value is None:\n            return default\n   \
          \     if isinstance(value, (dict, list)):\n            return value\n  \
          \      if isinstance(value, str):\n            text = value.strip()\n  \
          \          if not text:\n                return default\n            try:\n\
          \                return json.loads(text)\n            except json.JSONDecodeError:\n\
          \                return default\n        return default\n\n    def strip_fence(text):\n\
          \        text = str(text or \"\").strip()\n        text = re.sub(r\"^```[a-zA-Z]*\\\
          n?\", \"\", text)\n        text = re.sub(r\"\\n?```$\", \"\", text)\n  \
          \      return text.strip()\n\n    def extract_first_json_object(text):\n\
          \        start = text.find(\"{\")\n        if start < 0:\n            raise\
          \ ValueError(\"No JSON object found in LLM output.\")\n        depth = 0\n\
          \        in_string = False\n        escape = False\n\n        for index\
          \ in range(start, len(text)):\n            char = text[index]\n        \
          \    if in_string:\n                if escape:\n                    escape\
          \ = False\n                elif char == \"\\\\\":\n                    escape\
          \ = True\n                elif char == '\"':\n                    in_string\
          \ = False\n                continue\n\n            if char == '\"':\n  \
          \              in_string = True\n            elif char == \"{\":\n     \
          \           depth += 1\n            elif char == \"}\":\n              \
          \  depth -= 1\n                if depth == 0:\n                    return\
          \ text[start:index + 1]\n\n        raise ValueError(\"Incomplete JSON object\
          \ in LLM output.\")\n\n    def safe_float_or_none(value):\n        try:\n\
          \            if value is None or value == \"\":\n                return\
          \ None\n            return float(value)\n        except (TypeError, ValueError):\n\
          \            return None\n\n    def parse_bool_or_none(value):\n       \
          \ if isinstance(value, bool):\n            return value\n        if value\
          \ is None:\n            return None\n        if isinstance(value, (int,\
          \ float)):\n            return bool(value)\n        text = str(value).strip().lower()\n\
          \        if text in {\"true\", \"yes\", \"y\", \"1\"}:\n            return\
          \ True\n        if text in {\"false\", \"no\", \"n\", \"0\"}:\n        \
          \    return False\n        return None\n\n    def normalize_text_or_none(value):\n\
          \        if value is None:\n            return None\n        text = str(value).strip()\n\
          \        return text or None\n\n    def normalize_date_or_none(value):\n\
          \        text = normalize_text_or_none(value)\n        if text is None:\n\
          \            return None\n        return text\n\n    def load_settings_inline(settings_payload,\
          \ currency_values, expense_group_values):\n        data = parse_json_maybe(settings_payload,\
          \ {})\n        if not isinstance(data, dict):\n            data = {}\n\n\
          \        allowed_currencies = {\n            value.upper()\n           \
          \ for value in clean_string_list(\n                currency_values if currency_values\
          \ is not None else data.get(\"currencies\", [])\n            )\n       \
          \ }\n        allowed_expense_groups = set(\n            clean_string_list(\n\
          \                expense_group_values\n                if expense_group_values\
          \ is not None\n                else data.get(\"expense_groups\", [])\n \
          \           )\n        )\n\n        return {\n            \"currencies\"\
          : allowed_currencies,\n            \"expense_groups\": allowed_expense_groups,\n\
          \        }\n\n    def normalize_currency(value):\n        settings = load_settings_inline(settings_json,\
          \ currencies, expense_groups)\n        if value is None:\n            return\
          \ None\n\n        text = str(value).strip().upper()\n        if not text:\n\
          \            return None\n\n        return text if text in settings[\"currencies\"\
          ] else None\n\n    def normalize_expense_group(value):\n        settings\
          \ = load_settings_inline(settings_json, currencies, expense_groups)\n  \
          \      if value is None:\n            return None\n\n        text = str(value).strip()\n\
          \        if not text:\n            return None\n\n        return text if\
          \ text in settings[\"expense_groups\"] else None\n\n    def get_history_default(features,\
          \ field):\n        stable_defaults = features.get(\"stable_defaults\", {})\n\
          \        entry = stable_defaults.get(field, {})\n        if isinstance(entry,\
          \ dict) and entry.get(\"use_as_default\") is True:\n            return entry.get(\"\
          value\")\n        return None\n\n    def get_default_source(features, field):\n\
          \        return \"history_default\" if get_history_default(features, field)\
          \ is not None else \"rule\"\n\n    def normalize_missing_fields(value):\n\
          \        items = parse_json_maybe(value, value)\n        if items is None:\n\
          \            return []\n        if isinstance(items, str):\n           \
          \ items = [items]\n        if not isinstance(items, list):\n           \
          \ return []\n        return [str(item).strip() for item in items if str(item).strip()]\n\
          \n    def normalize_source_file_indices(value):\n        if value is None:\n\
          \            return []\n        if not isinstance(value, list):\n      \
          \      value = [value]\n        result = []\n        for item in value:\n\
          \            try:\n                result.append(int(item))\n          \
          \  except (TypeError, ValueError):\n                continue\n        return\
          \ result\n\n    raw = strip_fence(llm_raw_output)\n    try:\n        obj\
          \ = json.loads(raw)\n    except json.JSONDecodeError:\n        obj = json.loads(extract_first_json_object(raw))\n\
          \n    feat = parse_json_maybe(history_features, {})\n    receipt = parse_json_maybe(receipt_extraction,\
          \ {})\n    raw_receipt_text = normalize_text_or_none(receipt_raw_text)\n\
          \n    def normalize_single_result(result_obj, fallback_group_index):\n \
          \       result_obj = result_obj if isinstance(result_obj, dict) else {}\n\
          \n        predicted_input = result_obj.get(\"predicted_input\", {})\n  \
          \      if not isinstance(predicted_input, dict):\n            predicted_input\
          \ = {}\n\n        llm_field_confidence = parse_json_maybe(\n           \
          \ result_obj.get(\"llm_field_confidence\", {}),\n            {},\n     \
          \   )\n        if not isinstance(llm_field_confidence, dict):\n        \
          \    llm_field_confidence = {}\n\n        missing_fields = normalize_missing_fields(result_obj.get(\"\
          missing_fields\", []))\n        required_user_input_reason = parse_json_maybe(\n\
          \            result_obj.get(\"required_user_input_reason\", {}),\n     \
          \       {},\n        )\n        if not isinstance(required_user_input_reason,\
          \ dict):\n            required_user_input_reason = {}\n\n        explanations\
          \ = parse_json_maybe(result_obj.get(\"explanations\", []), [])\n       \
          \ if not isinstance(explanations, list):\n            explanations = [str(explanations)]\n\
          \        explanations = [str(item).strip() for item in explanations if str(item).strip()][:3]\n\
          \n        field_sources = {}\n\n        submitted = predicted_input.setdefault(\"\
          submitted_to\", {})\n        if not isinstance(submitted, dict):\n     \
          \       submitted = {}\n            predicted_input[\"submitted_to\"] =\
          \ submitted\n\n        detail = predicted_input.setdefault(\"expense_detail\"\
          , {})\n        if not isinstance(detail, dict):\n            detail = {}\n\
          \            predicted_input[\"expense_detail\"] = detail\n        detail.pop(\"\
          book_rate\", None)\n        detail.pop(\"equivalent_hkd_amount\", None)\n\
          \n        submitted_type = normalize_text_or_none(submitted.get(\"type\"\
          ))\n        if submitted_type not in {\"Department\", \"Specific Endorser\"\
          }:\n            submitted_type = get_history_default(feat, \"submitted_to.type\"\
          ) or \"Department\"\n            field_sources[\"submitted_to.type\"] =\
          \ get_default_source(feat, \"submitted_to.type\")\n        else:\n     \
          \       field_sources[\"submitted_to.type\"] = \"llm\"\n        submitted[\"\
          type\"] = submitted_type\n\n        submitted_target = normalize_text_or_none(submitted.get(\"\
          target\"))\n        if submitted_target is None:\n            submitted_target\
          \ = get_history_default(feat, \"submitted_to.target\") or \"CPEG Office\"\
          \n            field_sources[\"submitted_to.target\"] = get_default_source(feat,\
          \ \"submitted_to.target\")\n        else:\n            field_sources[\"\
          submitted_to.target\"] = \"llm\"\n        submitted[\"target\"] = submitted_target\n\
          \n        predicted_input[\"contact_number\"] = None\n        field_sources[\"\
