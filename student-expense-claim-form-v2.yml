    - data:
        code: "import json\n\n\ndef parse_json(value, fallback):\n    if value is\
          \ None:\n        return fallback\n\n    if isinstance(value, (dict, list)):\n\
          \        return value\n\n    if isinstance(value, str):\n        value =\
          \ value.strip()\n\n        if value.startswith(\"```\"):\n            value\
          \ = value.strip(\"`\")\n            value = value.replace(\"json\\n\", \"\
          \", 1).replace(\"JSON\\n\", \"\", 1).strip()\n\n        try:\n         \
          \   return json.loads(value)\n        except Exception:\n            return\
          \ fallback\n\n    return fallback\n\n\ndef clean(value, default=\"\"):\n\
          \    if value is None:\n        return default\n\n    value = str(value).strip()\n\
          \n    if value == \"\":\n        return default\n\n    return value\n\n\n\
          def get_receipts(gemini_data):\n    \"\"\"\n    Supports:\n    1. {\"receipts\"\
          : [{...}, {...}]}\n    2. single receipt dict\n    3. list of receipt dicts\n\
          \    \"\"\"\n    if isinstance(gemini_data, dict):\n        receipts = gemini_data.get(\"\
          receipts\")\n        if isinstance(receipts, list):\n            return\
          \ receipts\n        return [gemini_data]\n\n    if isinstance(gemini_data,\
          \ list):\n        return gemini_data\n\n    return []\n\n\ndef get_llm_results(llm_data):\n\
          \    if isinstance(llm_data, dict):\n        results = llm_data.get(\"results\"\
          )\n        if isinstance(results, list):\n            return results\n \
          \   return []\n\n\ndef get_expense_detail_from_llm_result(llm_result):\n\
          \    try:\n        return (\n            llm_result\n            .get(\"\
          predicted_input\", {})\n            .get(\"expense_detail\", {})\n     \
          \   )\n    except Exception:\n        return {}\n\n\ndef get_missing_fields_from_llm_result(llm_result):\n\
          \    missing = llm_result.get(\"missing_fields\", [])\n    return missing\
          \ if isinstance(missing, list) else []\n\n\ndef extract_file_refs(receipt_file):\n\
          \    files = parse_json(receipt_file, receipt_file)\n\n    if files in [None,\
          \ \"\"]:\n        return []\n\n    if isinstance(files, str):\n        return\
          \ [files]\n\n    if isinstance(files, dict):\n        ref = (\n        \
          \    files.get(\"url\")\n            or files.get(\"remote_url\")\n    \
          \        or files.get(\"signed_url\")\n            or files.get(\"name\"\
          )\n            or files.get(\"filename\")\n            or files.get(\"file_name\"\
          )\n        )\n        return [ref] if ref else []\n\n    if isinstance(files,\
          \ list):\n        refs = []\n\n        for file_obj in files:\n        \
          \    if isinstance(file_obj, str):\n                refs.append(file_obj)\n\
          \            elif isinstance(file_obj, dict):\n                ref = (\n\
          \                    file_obj.get(\"url\")\n                    or file_obj.get(\"\
          remote_url\")\n                    or file_obj.get(\"signed_url\")\n   \
          \                 or file_obj.get(\"name\")\n                    or file_obj.get(\"\
          filename\")\n                    or file_obj.get(\"file_name\")\n      \
          \          )\n                refs.append(ref or \"\")\n\n        return\
          \ refs\n\n    return []\n\n\ndef files_for_receipt(file_refs, source_file_indices):\n\
          \    if not isinstance(source_file_indices, list):\n        return file_refs\n\
          \n    selected = []\n\n    for index in source_file_indices:\n        try:\n\
          \            index = int(index)\n            if 0 <= index < len(file_refs):\n\
          \                selected.append(file_refs[index])\n        except Exception:\n\
          \            pass\n\n    return selected\n\n\ndef get_history_value(history,\
          \ key):\n    return clean(history.get(key) or history.get(\"fixed_identity\"\
          , {}).get(key))\n\n\ndef main(\n    llm_claim_json: str,\n    gemini_ocr_json:\
          \ str,\n    history_json: str,\n    receipt_file\n) -> dict:\n\n    llm_data\
          \ = parse_json(llm_claim_json, {\"results\": []})\n    gemini_data = parse_json(gemini_ocr_json,\
          \ {})\n    history = parse_json(history_json, {})\n\n    gemini_receipts\
          \ = get_receipts(gemini_data)\n    llm_results = get_llm_results(llm_data)\n\
          \    file_refs = extract_file_refs(receipt_file)\n\n    submitted_to = history.get(\"\
          submitted_to\", {})\n\n    final_receipts = []\n\n    for i, receipt in\
          \ enumerate(gemini_receipts):\n        llm_result = llm_results[i] if i\
          \ < len(llm_results) else {}\n        llm_expense = get_expense_detail_from_llm_result(llm_result)\n\
          \n        source_file_indices = receipt.get(\"source_file_indices\", [i])\n\
          \n        date_start = clean(\n            receipt.get(\"transaction_date_start\"\
          )\n            or receipt.get(\"transaction_date\")\n            or receipt.get(\"\
          date\")\n        )\n\n        date_end = clean(\n            receipt.get(\"\
          transaction_date_end\")\n            or receipt.get(\"date_end\")\n    \
          \    )\n\n        if date_start and not date_end:\n            date_end\
          \ = date_start\n\n        currency = clean(receipt.get(\"currency\"))\n\n\
          \        amount = clean(\n            receipt.get(\"amount_paid\")\n   \
          \         or receipt.get(\"total\")\n            or receipt.get(\"grand_total\"\
          )\n        )\n\n        expense_description = clean(llm_expense.get(\"expense_description\"\
          ))\n        expense_group = clean(llm_expense.get(\"expense_group\"))\n\
          \        business_purpose = clean(llm_expense.get(\"business_purpose\"))\n\
          \n        missing_fields = get_missing_fields_from_llm_result(llm_result)\n\
          \n        required_checks = {\n            \"transaction_date_start\": date_start,\n\
          \            \"currency\": currency,\n            \"amount\": amount,\n\
          \            \"expense_description\": expense_description,\n           \
          \ \"expense_group\": expense_group,\n            \"business_purpose\": business_purpose\n\
          \        }\n\n        for field, value in required_checks.items():\n   \
          \         if value == \"\" and field not in missing_fields:\n          \
          \      missing_fields.append(field)\n\n        final_receipts.append({\n\
          \            \"transaction_date_start\": date_start,\n            \"transaction_date_end\"\
          : date_end,\n            \"expense_description\": expense_description,\n\
          \            \"currency\": currency,\n            \"amount\": amount,\n\
          \            \"expense_group\": expense_group,\n            \"business_purpose\"\
          : business_purpose,\n            \"attach_receipt\": files_for_receipt(file_refs,\
          \ source_file_indices),\n            \"missing_fields\": missing_fields\n\
          \        })\n\n    final_output = {\n        \"requestor\": get_history_value(history,\
          \ \"requestor\"),\n        \"department\": get_history_value(history, \"\
          department\"),\n        \"email\": get_history_value(history, \"email\"\
          ),\n        \"student_id\": get_history_value(history, \"student_id\"),\n\
          \        \"contact_number\": clean(history.get(\"contact_number\")),\n \
          \       \"supervisor_advisor_faculty\": clean(history.get(\"supervisor_advisor_faculty\"\
          )),\n        \"submitted_to\": {\n            \"type\": clean(submitted_to.get(\"\
          type\"), \"null\"),\n            \"target\": clean(submitted_to.get(\"target\"\
          ), \"null\")\n        },\n        \"receipts\": final_receipts\n    }\n\n\
          \    return {\n        \"final_claim_json\": json.dumps(final_output, ensure_ascii=False)\n\
          \    }"
        code_language: python3
