            \ date format YYYY-MM-DD when possible.\n- If there are no specific transaction\
            \ end date, use transaction_date_start.\n- Include every visible line\
            \ item.\n- If the receipt is blurry or incomplete, set raw_text_confidence\
            \ to \"low\"."
